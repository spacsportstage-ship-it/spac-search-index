name: Build prepared search index

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - rebuild-prepared-search-index
  schedule:
    # Avoid minute 0, where GitHub scheduled workflows are most likely to be delayed or dropped.
    - cron: "7-59/5 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: prepared-search-index
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build prepared index
        run: node tools/search-index/build-prepared-search-index.mjs

      - name: Validate prepared index
        run: |
          node - <<'NODE'
          const fs = require("node:fs");

          const prepared = JSON.parse(fs.readFileSync("dist/prepared.json", "utf8"));
          const products = Array.isArray(prepared.products) ? prepared.products : [];
          const haystack = products.map((product) => JSON.stringify(product).toLowerCase()).join("\n");
          const requiredTerms = ["Khaplu DUO", "Kargil DUO", "025146", "025147"];
          const missingTerms = requiredTerms.filter((term) => !haystack.includes(term.toLowerCase()));

          if (!products.length) {
            throw new Error("Prepared index contains no products.");
          }

          if (missingTerms.length) {
            throw new Error(`Prepared index is missing required 4Daagse products/codes: ${missingTerms.join(", ")}`);
          }

          console.log(`Validated ${products.length} prepared products.`);
          NODE

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
